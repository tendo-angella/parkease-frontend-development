<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ParkEase</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

    <div class="container-fluid">
      <div class="row">
        <!-- SIDEBAR -->
        <nav

          class="col-md-2 col-lg-2 d-md-block sidebar collapse p-3"
        >
          <h4 class="mb-4 text-white">Park Ease</h4>
          <ul class="nav flex-column">
            <li class="nav-item">
              <a class="nav-link text-white" href="dashboard.html"
                ><i class="bi bi-speedometer2 me-2"></i>Dashboard</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="vehicle.html"
                ><i class="bi bi-car-front-fill me-2"></i>Register Vehicle</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="signout-vehicle.html">
                <i class="bi bi-box-arrow-left me-2"></i>Sign-out Vehicle
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="carwash.html"
                ><i class="bi bi-droplet-fill me-2"></i>Car Wash</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="tyre.html"
                ><i class="bi bi-circle-half me-2"></i>Tyre Clinic</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="battery.html"
                ><i class="bi bi-battery-half me-2"></i>Battery Hire</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="reports.html"
                ><i class="bi bi-file-text-fill me-2"></i>Reports</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="users.html"
                ><i class="bi bi-people-fill me-2"></i>Manage Users</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="prices.html"
                ><i class="bi bi-currency-dollar me-2"></i>Price Settings</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="login.html"
                ><i class="bi bi-box-arrow-right me-2"></i>Logout</a
              >
            </li>
          </ul>
        </nav>

        <!-- MAIN CONTENT -->
        <main class="col-md-9 col-lg-10 ms-sm-auto px-md-4">
          <!-- TOPBAR -->
          <div
            class="topbar d-flex justify-content-between align-items-center py-3 px-3 shadow-sm mb-4"
          >
            <button
              class="btn btn-outline-dark d-md-none"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#sidebarMenu"
            >
              ☰
            </button>
            <h5 class="m-0">VEHICLE REGISTRATION</h5>
            <span>User: Manager</span>
          </div>

          <!-- CONTENT AREA -->
          <div class="content-area">
            <!-- PAGE CONTENT HERE -->
            <div class="card p-4">
              <h4 class="mb-4">
                <i class="bi bi-car-front-fill me-2"></i>Vehicle Registration
              </h4>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">Driver Name</label>
                  <input class="form-control" />
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label">Vehicle Type</label>
                  <input class="form-control" />
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label">Number Plate</label>
                  <input class="form-control" />
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label">Vehicle Model</label>
                  <input class="form-control" />
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label">Color</label>
                  <input class="form-control" />
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label">Phone Number</label>
                  <input class="form-control" />
                </div>
              </div>

              <button class="btn btn-dark mt-3">
                <i class="bi bi-plus-circle me-2"></i>Register Vehicle
              </button>
            </div>
          </div>
        </main>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</html>
