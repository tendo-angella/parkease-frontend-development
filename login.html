<!doctype html>
<html>
  <head>
    <title>Login - ParkEase</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="login-body">
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-4">
          <div class="card p-4">
            <h2 class="Welcome">Welcome to Park Ease</h2>
            <h4 class="mb-4 text-center">Login</h4>

            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" class="form-control" />
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" />
            </div>

            <div class="mb-3">
              <label class="form-label">Role</label>
              <select class="form-select">
                <option>Manager</option>
                <option>Park Attendant</option>
                <option>Tyre Clinic Attendant</option>
                <option>Battery Hire Attendant</option>
              </select>
            </div>

            <a href="dashboard.html" class="btn btn-dark w-100">Login</a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
